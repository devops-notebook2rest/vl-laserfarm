name: Testpipeline_Notebook2REST

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.ipynb'
      - '**/*.naavrewf'
      - "n2res/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.ipynb'
      - '**/*.naavrewf'
      - "n2res/**"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:

  # NOTE: THIS JOB IS A SAMPLE OF HOW WE CAN DO IT LATER
  notebook2rest-setup:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-north-1
      EKS_CLUSTER_NAME: notebook2rest_cluster

    permissions:
      id-token: write
      contents: read
      
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::259361438396:role/HelmchartDeployer
        aws-region: ${{ env.AWS_REGION }}

    - name: Install Helm Chart
      uses: bitovi/github-actions-deploy-eks-helm@v1.2.12
      with:
        aws-region: ${{ env.AWS_REGION-region }}
        cluster-name: notebook2rest_cluster
        cluster-role-arn: arn:aws:iam::259361438396:role/vl-laserfarm-cluster-role
        chart-path: n2res
        namespace: default
        release_name: my-api
        set-values: |
          image.repository=259361438396.dkr.ecr.eu-north-1.amazonaws.com/notebook2rest/api
          image.tag=ba845f30dd926ad55cdfa5e35414e7d15f35895f-15

