# # What this workflow does:
# # 1. Install the Notebook2REST tool, and feed the notebooks to it
# # 2. Build a docker image of the resulting API, with a new specific versionnumber/tag-name
# # 3. Push the docker image to Amazon ECR
# # 4. Log in to AWS, and redeploy the helm chart with the new image tag

name: Notebook2REST_SECOND

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.ipynb'
      - '**/*.naavrewf'
      - "n2res/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.ipynb'
      - '**/*.naavrewf'
      - "n2res/**"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:

  # NOTE: THIS JOB IS A SAMPLE OF HOW WE CAN DO IT LATER
  notebook2rest-setup:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-north-1
      EKS_CLUSTER_NAME: notebook2rest_cluster
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # IMAGE_TAG: ${{ github.sha }}-${{ github.run_number }} # <-- GEBRUIK DEZE NOG

    permissions:
      id-token: write
      contents: read
      
    steps:
      - name: Checkout notebook repository
        uses: actions/checkout@v4

      - name: Setup AWS
        run: aws sts get-caller-identity

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Deploy Helm chart
        run: helm upgrade --install my-api ./n2res --namespace default --set image.repository=259361438396.dkr.ecr.eu-north-1.amazonaws.com/notebook2rest/api --set image.tag=ba845f30dd926ad55cdfa5e35414e7d15f35895f-15
